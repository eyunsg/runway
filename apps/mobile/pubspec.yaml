name: runway
description: '2026 PBL'
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^17.1.0
  http: ^1.6.0
  dartz: ^0.10.1
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/env/.env
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_24pt-Regular.ttf
          weight: 400

        - asset: assets/fonts/Inter_24pt-Medium.ttf
          weight: 500

        - asset: assets/fonts/Inter_24pt-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700

        - asset: assets/fonts/Inter_24pt-ExtraBold.ttf
          weight: 800
