name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  flutter-test:
    name: Frontend (Flutter) Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
      - name: Create env file
        run: |
          mkdir -p apps/mobile/assets/env
          cp apps/mobile/.env.example apps/mobile/assets/env/.env
      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get
      - name: Run tests
        run: |
          cd apps/mobile
          flutter test

  supabase-test:
    name: Backend (Supabase) Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test

  flutter-supabase-test:
    name: Flutter Supabase Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'

      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get

      - name: Run Supabase Integration Tests (VM)
        run: |
          cd apps/mobile
          flutter test test/integration/auth_flow_test.dart \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL_TEST }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_TEST }}
